version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - echo "Validating Java toolchain"
      - mvn -version
  build:
    commands:
      - echo "Building Java project"
      - mvn -B clean package
  post_build:
    commands:
      - echo "Java build completed"

artifacts:
  files:
    - target/**/*.jar
  discard-paths: no

cache:
  paths:
    - /root/.m2/**/*
