version: 0.2
env:
  variables:
    ENVIRONMENT: prd
    TARGET_TF_MODULE_DIR: <TARGET_TF_MODULE_DIR>

phases:
  install:
    commands:
      - wget https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
      - unzip terraform_1.8.5_linux_amd64.zip
      - mv terraform /usr/local/bin/

  pre_build:
    commands:
      - export CHDIR="$CODEBUILD_SRC_DIR_WORK/$TARGET_TF_MODULE_DIR"
      - export TERRAFORM_TFVARS_PATH="$CHDIR/environments/$ENVIRONMENT.tfvars"
      - echo $CHDIR
      - echo $TERRAFORM_TFVARS_PATH

  build:
    commands:
      - terraform -chdir=$CHDIR init
      - terraform -chdir=$CHDIR apply -auto-approve -var-file=$TERRAFORM_TFVARS_PATH
